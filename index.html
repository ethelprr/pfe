<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>03 — Images</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/maquette.png",
          "properties": {
            "left": 0, "top": 0,
            "width": 1394, "height": 1034,
            "originalWidth": 1394, "originalHeight": 1034,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <!-- Preload image asset -->
    <a-assets>
      <img id="dessin1" src="assets/batiments.png" crossorigin="anonymous">
      <img id="dessin2" src="assets/herbe + arbres.png" crossorigin="anonymous">
      <img id="dessin3" src="assets/voitures.png" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="my-poster">

      <!-- Three instances of the same image, stacked along the Y-axis
           (perpendicular to the poster surface) with slight Z offsets -->

      <!-- Instance 1 — back layer -->
      <a-image src="#dessin1" position="-0.1 0 0.05" width="1" height="0.85" rotation="0 0 270" scale="1.1 1.1 1.1"></a-image>

      <!-- Instance 2 — middle layer -->
      <a-image src="#dessin2" position="-0.14 0 0.1" width="1" height="0.77" rotation="0 0 270" scale="1 1 1"></a-image>

      <!-- Instance 3 — front layer -->
      <a-image src="#dessin3" position="-0.16 0.05 0.2" width="1" height="0.77" rotation="0 0 270" scale="1 1 1"></a-image>

     

    </xrextras-named-image-target>

  </a-scene>
</body>
</html>

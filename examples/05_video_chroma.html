<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>05 — Video Chromakey</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/1000055040bw-resize-640x480.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 480, "height": 640,
            "originalWidth": 480, "originalHeight": 640,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <!-- Chromakey Shader
       Makes a specific color (green screen) transparent in video textures.
       Fragment shader: computes distance from chroma color, maps to alpha. -->
  <script>
    AFRAME.registerShader('chromakey', {
      schema: {
        src: {type: 'map'},
        color: {default: {x: 0.0, y: 1.0, z: 0.0}, type: 'vec3', is: 'uniform'},
        chroma: {type: 'bool', is: 'uniform'},
        transparent: {default: true, is: 'uniform'}
      },

      init: function (data) {
        var videoEl = data.src;
        document.addEventListener('click', function () {
          if (videoEl && videoEl.play) { videoEl.play(); }
        });

        var videoTexture = new THREE.VideoTexture(data.src);
        videoTexture.minFilter = THREE.LinearFilter;
        this.material = new THREE.ShaderMaterial({
          uniforms: {
            chroma: {type: 'b', value: data.chroma},
            color: {type: 'c', value: data.color},
            myTexture: {type: 't', value: videoTexture}
          },
          vertexShader: [
            'varying vec2 vUv;',
            'void main(void) {',
            '  vUv = uv;',
            '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
            '}'
          ].join('\n'),
          fragmentShader: [
            'uniform sampler2D myTexture;',
            'uniform vec3 color;',
            'uniform bool chroma;',
            'varying vec2 vUv;',
            'void main(void) {',
            '  vec3 tColor = texture2D(myTexture, vUv).rgb;',
            '  float a;',
            '  if (chroma == true) {',
            '    a = (length(tColor - color) - 0.5) * 7.0;',
            '  } else {',
            '    a = 1.0;',
            '  }',
            '  gl_FragColor = vec4(tColor, a);',
            '}'
          ].join('\n'),
          transparent: true
        });
      },

      update: function (data) {
        this.material.color = data.color;
        this.material.src = data.src;
        this.material.transparent = data.transparent;
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <!-- Preload video asset
         Replace ../assets/greenscreen.mp4 with your own green screen video -->
    <a-assets>
      <video id="vid" src="../assets/mask_green_back.mp4"
             autoplay loop muted playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="my-poster">

      <!-- Video plane with chromakey shader
           - color: 0 1 0 = green (use 0 0 1 for blue screen)
           - Adjust width/height to match your video aspect ratio -->
      <a-entity geometry="primitive: plane; width: 2; height: 1.5"
                material="shader: chromakey; src: #vid; chroma: true; color: 0. 1. 0.; transparent: true"
                position="0 0.0 0">
      </a-entity>

    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
